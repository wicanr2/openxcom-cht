name: Build macOS Universal (arm64 + x86_64)

# Builds an OpenXcom .app bundle as a Universal Binary
# Triggered manually or on git tag push (e.g. v2.30)
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*-mac'

jobs:
  build:
    runs-on: macos-14  # Apple Silicon runner (arm64 host)
    timeout-minutes: 60

    steps:
      - name: Checkout openxcom-cht (this repo)
        uses: actions/checkout@v4
        with:
          path: openxcom-cht

      - name: Checkout OpenXcom upstream
        uses: actions/checkout@v4
        with:
          repository: OpenXcom/OpenXcom
          ref: master
          path: openxcom-src

      - name: Apply CHT source patches
        run: |
          cd $GITHUB_WORKSPACE
          # Copy all patches/src/**/*.{cpp,h} → openxcom-src/src/
          find openxcom-cht/patches/src -type f \( -name "*.cpp" -o -name "*.h" \) | while read f; do
            rel="${f#openxcom-cht/patches/src/}"
            cp "$f" "openxcom-src/src/$rel"
            echo "patched: $rel"
          done

      - name: Copy CHT translations + fonts + signature
        run: |
          cd $GITHUB_WORKSPACE
          cp -r openxcom-cht/bin/common   openxcom-src/bin/
          cp openxcom-cht/bin/standard/xcom1/Language/zh-TW.yml openxcom-src/bin/standard/xcom1/Language/
          cp openxcom-cht/bin/standard/xcom2/Language/zh-TW.yml openxcom-src/bin/standard/xcom2/Language/
          cp -r openxcom-cht/bin/common/SoldierName openxcom-src/bin/common/

      - name: Install build dependencies (Homebrew + pip)
        run: |
          brew update
          # Homebrew 從 main 移除了 SDL 1.2 image/mixer/gfx → 下方 build from source
          brew install cmake pkg-config yaml-cpp dylibbundler libpng libjpeg libtiff
          brew install sdl12-compat
          brew list --versions cmake yaml-cpp sdl12-compat
          # PIL/Pillow 用來生成 icon (chibi signature → icns)
          python3 -m pip install --break-system-packages Pillow || python3 -m pip install --user Pillow

      - name: Build SDL 1.2 image/mixer/gfx from source
        run: |
          set -e
          PREFIX="$(brew --prefix)"
          mkdir -p /tmp/sdl_build && cd /tmp/sdl_build

          # SDL_image 1.2.12
          curl -fsSL https://www.libsdl.org/projects/SDL_image/release/SDL_image-1.2.12.tar.gz -o sdl_image.tgz
          tar xzf sdl_image.tgz && cd SDL_image-1.2.12
          ./configure --prefix="$PREFIX" --with-sdl-prefix="$PREFIX" \
            --disable-jpg-shared --disable-png-shared --disable-tif-shared \
            --disable-webp --disable-jxl
          make -j$(sysctl -n hw.ncpu) && make install
          cd ..

          # SDL_mixer 1.2.12
          curl -fsSL https://www.libsdl.org/projects/SDL_mixer/release/SDL_mixer-1.2.12.tar.gz -o sdl_mixer.tgz
          tar xzf sdl_mixer.tgz && cd SDL_mixer-1.2.12
          ./configure --prefix="$PREFIX" --with-sdl-prefix="$PREFIX" \
            --disable-music-mp3 --disable-music-mod \
            --disable-music-flac --disable-music-fluidsynth-midi
          make -j$(sysctl -n hw.ncpu) && make install
          cd ..

          # SDL_gfx 2.0.26
          curl -fsSL https://www.ferzkopp.net/Software/SDL_gfx-2.0/SDL_gfx-2.0.26.tar.gz -o sdl_gfx.tgz
          tar xzf sdl_gfx.tgz && cd SDL_gfx-2.0.26
          ./configure --prefix="$PREFIX" --with-sdl-prefix="$PREFIX" --disable-mmx
          make -j$(sysctl -n hw.ncpu) && make install
          cd ..

          # 驗證
          ls -la "$PREFIX/lib/libSDL_image.dylib" "$PREFIX/lib/libSDL_mixer.dylib" "$PREFIX/lib/libSDL_gfx.dylib"

      - name: Configure cmake (Universal Binary)
        run: |
          cd $GITHUB_WORKSPACE/openxcom-src
          mkdir -p build && cd build
          # 暫時 arm64-only (SDL 1.2 from source autoconf 不支援 universal lipo)
          # Intel Mac 用戶可透過 Rosetta 2 100% 相容執行
          # Xcode 15.4 Clang 預設 C++20+，OpenXcom 用了已移除的 std::unary_function → force C++14
          cmake -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0" \
            -DCMAKE_CXX_STANDARD=14 \
            -DCMAKE_CXX_EXTENSIONS=OFF \
            -DCMAKE_CXX_FLAGS="-Wno-deprecated-declarations" \
            ..

      - name: Build openxcom (.app bundle already produced by upstream CMake)
        run: |
          cd $GITHUB_WORKSPACE/openxcom-src/build
          make openxcom -j$(sysctl -n hw.ncpu)
          # OpenXcom CMake 直接產 openxcom.app (BundleUtilities 已 inject dylibs)
          ls -la openxcom.app/Contents/MacOS/openxcom
          lipo -info openxcom.app/Contents/MacOS/openxcom
          echo "=== openxcom.app 結構 ==="
          find openxcom.app -maxdepth 3 -type d

      - name: Build .app bundle (UFO variant)
        run: |
          cd $GITHUB_WORKSPACE
          APP="OpenXcom-CHT-UFO.app"
          rm -rf "$APP"

          # 用 upstream 已 build 好的 openxcom.app 為基底（dylibs 已 bundled）
          cp -R openxcom-src/build/openxcom.app "$APP"

          # 加遊戲資料到 Resources/data/
          mkdir -p "$APP/Contents/Resources/data"
          cp -r openxcom-src/bin/common   "$APP/Contents/Resources/data/"
          cp -r openxcom-src/bin/standard "$APP/Contents/Resources/data/"
          cp -r openxcom-src/bin/UFO      "$APP/Contents/Resources/data/"

          # Icon (chibi signature scaled)
          cd openxcom-cht
          python3 -c "
          from PIL import Image
          src = Image.open('bin/common/Resources/signature_pang.png').convert('RGBA')
          face = src.crop((0, 0, 24, 24))
          face.resize((512, 512), Image.NEAREST).save('/tmp/icon.png')
          "
          cd $GITHUB_WORKSPACE
          mkdir -p /tmp/iconset.iconset
          for sz in 16 32 64 128 256 512; do
            sips -z $sz $sz /tmp/icon.png --out /tmp/iconset.iconset/icon_${sz}x${sz}.png
            sips -z $((sz*2)) $((sz*2)) /tmp/icon.png --out /tmp/iconset.iconset/icon_${sz}x${sz}@2x.png 2>/dev/null || true
          done
          iconutil -c icns /tmp/iconset.iconset -o "$APP/Contents/Resources/openxcom.icns"

          # Info.plist
          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>openxcom-launcher</string>
            <key>CFBundleIconFile</key><string>openxcom.icns</string>
            <key>CFBundleIdentifier</key><string>com.wicanr2.openxcom-cht.ufo</string>
            <key>CFBundleName</key><string>OpenXcom CHT UFO</string>
            <key>CFBundleDisplayName</key><string>OpenXcom 繁中 (UFO)</string>
            <key>CFBundleVersion</key><string>2.29</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

          # Launcher script that sets up portable user dir + active mod xcom1
          cat > "$APP/Contents/MacOS/openxcom-launcher" <<'LAUNCH'
          #!/bin/bash
          HERE="$(dirname "$0")"
          APP_ROOT="$(cd "$HERE/../.." && pwd)"
          DATA="$APP_ROOT/Contents/Resources/data"
          USER_DIR="${XDG_DATA_HOME:-$HOME/Library/Application Support}/openxcom-cht-UFO"
          CFG_DIR="${XDG_CONFIG_HOME:-$HOME/Library/Preferences}/openxcom-cht-UFO"
          mkdir -p "$USER_DIR" "$CFG_DIR"
          if [ ! -f "$CFG_DIR/options.cfg" ]; then
            cat > "$CFG_DIR/options.cfg" <<'CFG'
          mods:
            - active: true
              id: xcom1
          options:
            language: zh-TW
            displayWidth: 1280
            displayHeight: 800
            fullscreen: false
            borderless: false
            keepAspectRatio: true
            useScaleFilter: false
            useHQXFilter: false
            useXBRZFilter: false
            useOpenGL: false
            soundVolume: 64
            musicVolume: 64
            uiVolume: 42
            playIntro: true
          CFG
          fi
          exec "$HERE/openxcom" -data "$DATA" -user "$USER_DIR" -config "$CFG_DIR" "$@"
          LAUNCH
          chmod +x "$APP/Contents/MacOS/openxcom-launcher"

      - name: Build .app bundle (TFTD variant)
        run: |
          cd $GITHUB_WORKSPACE
          # Reuse same EXE + libs + icon + plist; only swap data + launcher
          APP_TFTD="OpenXcom-CHT-TFTD.app"
          cp -R "OpenXcom-CHT-UFO.app" "$APP_TFTD"
          # Remove UFO data, add TFTD
          rm -rf "$APP_TFTD/Contents/Resources/data/UFO"
          cp -r openxcom-src/bin/TFTD "$APP_TFTD/Contents/Resources/data/" || \
            echo "WARNING: TFTD data not present in openxcom-src/bin/ - upstream master doesn't ship TFTD data"
          # Patch launcher: xcom2 instead of xcom1
          sed -i '' 's|openxcom-cht-UFO|openxcom-cht-TFTD|g; s|id: xcom1|id: xcom2|g' \
            "$APP_TFTD/Contents/MacOS/openxcom-launcher"
          # Update plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleName 'OpenXcom CHT TFTD'" "$APP_TFTD/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName 'OpenXcom 繁中 (TFTD)'" "$APP_TFTD/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier 'com.wicanr2.openxcom-cht.tftd'" "$APP_TFTD/Contents/Info.plist"

      - name: Create DMG + .tar.gz packages
        run: |
          cd $GITHUB_WORKSPACE
          for variant in UFO TFTD; do
            APP="OpenXcom-CHT-$variant.app"
            DMG="OpenXcom-CHT-v2.29-$variant-universal.dmg"
            TAR="OpenXcom-CHT-v2.29-$variant-mac.tar.gz"
            # DMG (macOS native, Gatekeeper friendly)
            hdiutil create -volname "OpenXcom-CHT-$variant" -srcfolder "$APP" \
              -ov -format UDZO "$DMG"
            # .tar.gz (cross-platform extract，方便 Windows 端注入遊戲資料)
            tar czf "$TAR" "$APP"
            echo "Built: $DMG ($(du -h "$DMG" | cut -f1))"
            echo "Built: $TAR ($(du -h "$TAR" | cut -f1))"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenXcom-CHT-v2.29-mac-universal
          path: |
            OpenXcom-CHT-v2.29-UFO-universal.dmg
            OpenXcom-CHT-v2.29-TFTD-universal.dmg
            OpenXcom-CHT-v2.29-UFO-mac.tar.gz
            OpenXcom-CHT-v2.29-TFTD-mac.tar.gz
          retention-days: 90

      - name: Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OpenXcom-CHT-v2.29-UFO-universal.dmg
            OpenXcom-CHT-v2.29-TFTD-universal.dmg
