  # === Batch v2.3 add: long UFOpaedia / desc translations (117 keys) ===
  STR_VICTORY_1: "你步入大廳，眼前正是這趟征途的目標——外星人的腦。在你扣動扳機之前，它透過基座上的螢幕向你發出訊息，懇求你在按下擊發鍵之前，先聽完它求生的辯白……"
  STR_VICTORY_2: "腦開口了：「數百萬年之前，你們稱為火星的這顆星球曾經生機盎然。這份生命是我們的文明帶到那顆貧瘠星球的，正如我們也將生命帶到你們的地球。千百萬年來，我們一直造訪你們的星球，並以基因工程培育你們這個物種。你們殺不死我們，你們本就是我們的一部分……"
  STR_VICTORY_3: "這裡是火星文明的中樞——金字塔群比你們地球上的金字塔早了數百萬年建成，其建造者正是你們的祖先。沒有任何星球是我們抵達不到的。用不了多久，這份力量也能屬於你們。我們所求的，不過是你們的合作……"
  STR_VICTORY_4: "外星人的腦話聲未落，便被一發熾熱的電漿轟然打斷，整支外星部隊隨之全軍覆沒。"
  STR_VICTORY_5: "外星人一旦失去火星，也就等於失去了地球。沒過多久，X-Com 累積的研究成果便讓人類重新繁榮，並將火星收歸己有。外星威脅雖已遠去，但何時會再度降臨，誰也說不準……"
  STR_GAME_OVER_1: "外星人發動滅絕人類的攻勢，摧毀城市，汙染空氣與海洋。面對遠超地球的科技，各國軍隊的抵抗形同徒勞。倖存的世代在逃離外星浩劫的途中飽受可怕的突變折磨，最終被驅趕入奴工營，被迫協助將地球改造為某個不知名外星帝國的殖民地。"
  STR_GAME_OVER_2: "X-Com 計畫所獲得的一切知識永遠就此散佚。你未能拯救地球。"
  STR_YOU_HAVE_FAILED: "你未能阻擋外星人的入侵。各個出資國一個接一個與外星人簽訂條約，換取科技、繁榮與和平的承諾。然而沒過多久，眾人便逐漸看清——外星人另有打算……"
  STR_ALIEN_ORIGINS_UFOPEDIA: "顯而易見，我們在地球上正打著一場注定要輸的戰爭。外星部隊在數量上壓倒性領先，我們頂多只能拖慢他們的腳步。人類唯一的希望，是直搗外星人的源頭。我們的研究顯示，他們的作戰基地很可能就在太陽系內附近。外星人暗示該處乃一座古老文明的中心，其歷史遠在人類有史之前。我們必須盡快定位這個地方。然而，要取得更詳盡的情報，我們得活捉並審訊一名外星人領袖——較大型的 UFO 上應該至少會搭載一名外星人領袖。"
  STR_THE_MARTIAN_SOLUTION_UFOPEDIA: "我們的研究現已指向火星，正是外星人行動的根據地。該基地藏匿得極為隱密，內含足以支撐入侵地球所需的全套製造與克隆設施，似乎還有一具統御整體行動的中央電腦。看來這個蜂巢式的外星社會也有自己的「蜂后」——這便是他們的根本弱點。只要消滅這個「大腦」，整個軀體就會隨之死去。我們必須加快研究腳步，否則為時已晚。若要再有突破，我們必須俘獲位階最高的外星指揮官——他們只會出現在外星基地與戰艦上。"
  STR_CYDONIA_OR_BUST_UFOPEDIA: "如今已可確認，外星大軍的指揮中樞位於賽多尼亞地下基地——這是火星上一處奇特的地區，以五面金字塔群與一座狀似人臉的巨大地貌而聞名。賽多尼亞文明在數百萬年前曾於火星上繁榮一時，但我們無從得知它為何衰亡，也不清楚它與當前外星活動之間有何關聯。無論真相為何，我們都必須派出遠征隊前往賽多尼亞。唯有如此，我們才有打敗外星人的機會。我們必須摧毀那個操控一切的「主腦」。為此我們需要一架復仇者級飛行器，並裝備我們所能調度的最強毀滅性武器。這裡再無可資研究之物——我們只能靜待賽多尼亞攻擊的結果。"
  STR_MOTION_SCANNER_UFOPEDIA: "本裝置運用多種感測器搭配先進電腦演算法，用於辨識正在移動的敵方單位；不過要熟練使用仍需若干練習。請點擊戰術畫面上的動作偵測器圖示，再從選單中選擇「使用偵測器」。偵測器畫面中央的箭頭代表士兵面向的方向（畫面上方為北）。閃爍的光點代表近期移動過的單位；大型單位或快速移動的單位會顯示為較大的光點。靜止不動的單位無法被偵測。"
  STR_MEDI_KIT_UFOPEDIA: "醫療包整合了治療、止痛與興奮等多項功能。要使用醫療包時，必須先讓士兵面向需要治療的對象；若該名士兵已陷入昏迷，則需正面跨站於其身上。點擊醫療包圖示，從選單中選擇「使用醫療包」。{NEWLINE}治療> 紅色部位代表致命傷。請點擊受傷的身體部位，再按下「治療」按鈕，即可治癒一處致命傷並回復部分健康值。{NEWLINE}興奮劑> 可回復精力，並使昏迷（暈眩）的士兵清醒。要喚醒昏迷士兵時，必須正面跨站於其身上。{NEWLINE}止痛劑> 可使受傷士兵的士氣回復至與其損失健康值相當的程度。"
  STR_PSI_AMP_UFOPEDIA: "心靈擴大器只能由具有心靈能力的士兵操作。戰鬥中請點擊心靈擴大器圖示，選擇攻擊類型，再以游標指定目標單位。心靈攻擊共有兩種：{NEWLINE}恐慌單位> 攻擊成功時將降低目標士氣，並可能使其陷入恐慌。{NEWLINE}心靈控制> 一旦成功，你便能立即操控該敵方單位，視同己方一員。此類攻擊的難度較高。"
  STR_PERSONAL_ARMOR_UFOPEDIA: "本款全新護甲採用新近發現的外星合金製成，讓我們的弟兄在面對外星威脅時，總算有了一搏之力。"
  STR_SECTOID_UFOPEDIA: "腦蟲的階級從士兵一路延伸至擁有強大心靈能力的領袖。這些心靈力量可用於在戰鬥中打擊我方士兵的士氣，甚至直接掌控他們的心智。他們慣於綁架人類並對牲畜進行肢解。綁架的目的在於攫取基因素材以進行雜交配種，並培養出可滲透人類社會的克隆體；牲畜則同時提供營養與基因素材。這個種族似乎一心想培育出更優秀的基因混種，以提升其蜂巢式社會的整體效率。"
  STR_SECTOID_AUTOPSY_UFOPEDIA: "解剖結果顯示其消化器官已嚴重退化，整體構造極為簡單；大腦與雙眼則十分發達。這樣的結構暗示了基因改造或突變的痕跡。狹小的嘴與鼻子似乎已幾乎喪失原有的功能。手指間有蹼，加上扁平的腳掌，暗示牠們起源於水生環境。體內找不到生殖器官，也沒有任何可顯示其繁衍方式的線索。牠們很可能是經由基因工程刻意製造出來的物種。"
  STR_SNAKEMAN_UFOPEDIA: "本種族演化自極度嚴苛的環境。牠們體質極為強悍，能承受劇烈的溫差變化。牠們的移動依靠一隻形似蛇身的巨大「足」，這個構造同時也保護著體內所有重要器官。牠們的目的看來純屬掠食，但行動上似乎受某種更高層智慧指揮，由其主導對地球的軍事式入侵。"
  STR_SNAKEMAN_AUTOPSY_UFOPEDIA: "其皮膚極為堅韌且耐熱。心血管系統其實是肌肉系統的一部分，藉由液壓原理產生運動，真正意義上的「肌肉」僅有「心臟」一處。繁殖系統效率極高，採無性繁殖方式，每隻蛇人體內隨時可懷有多達五十枚卵。若任其在地球發展，這個物種將對地球生命構成嚴重威脅。"
  STR_ETHEREAL_UFOPEDIA: "這種生物擁有令人震懾的心智力量，能進行心靈感應通訊與念力操作。牠們看似孱弱的身體機能，實則完全靠其強大的心智力量在維持。我們仍無法理解這些念力的運作原理，因為它們似乎悖於我們所知的物理定律。在任何戰鬥場合中，牠們都極度危險，並以心智力量作為主要武器。牠們鮮少親自現身於地球，似乎慣於藉由其他種族來達成自身的目的。"
  STR_ETHEREAL_AUTOPSY_UFOPEDIA: "這種生物在生理層面嚴重退化，看似無法獨自維持任何生命機能。肌肉嚴重萎縮，內臟器官發育不全。包括眼睛在內的感覺器官似乎已完全喪失功能。然而大腦卻異常發達，並耗用了體內大部分的血液供應。這種生物是如何在毫無外援的情況下維持自身運作，仍是一個未解之謎。"
  STR_MUTON_UFOPEDIA: "這種人形生物體格強健、頭腦聰穎。牠們對任何種類的生肉都有特殊嗜好，需要這類食物來維持生命，類似地球上的肉食動物。牠們似乎仰賴一個名為「靈體」的種族下達心電指令；一旦切斷這道心電聯繫，牠們的精神系統便會崩潰致死。體內的機械植入物用於強化作戰表現。牠們無疑只是更高層智慧麾下的步兵。"
  STR_MUTON_AUTOPSY_UFOPEDIA: "這種生物的「皮膚」似乎是一種以有機方式培育、再移植到身體上的保護性裝甲。體內有大量機械植入物，用以強化其心血管系統與感官能力。生殖器官似乎已被外科手術摘除，顯然這些不幸的生物注定只能過著作戰與征服的生涯。穿甲彈藥對牠們的強韌皮膚效果不彰。"
  STR_CELATID_UFOPEDIA: "這種生命體擁有一種神祕的天生能力——可在空中飄浮。牠似乎能偵測人類腦波，並會朝著人類目標靠近，即便目標藏得再隱密也不例外。一旦鎖定目標，盲蟲便會降落，並射出一顆顆腐蝕性極強的毒液小球。這種生物還能以驚人的速度進行自體克隆。牠通常與巨型怪一同出現。"
  STR_CELATID_AUTOPSY_UFOPEDIA: "其核心部位包含一具小型生物機械裝置，看似為某種天然演化而成的反重力推進系統。毒囊是體內最大的器官，亦不見有獨立的腦部結構，無從辨識其消化或生殖系統。另有一個小型器官內含胚胎，能迅速發育為新的個體。"
  STR_SILACOID_UFOPEDIA: "這種以矽為基礎的生命體會散發出極為龐大的熱量。其力量足以將岩石壓碎，再由熾熱的核心吞食消化。智力原始，可被植入物或心電生物操控。牠與巨型怪外星種族協同作戰。"
  STR_SILACOID_AUTOPSY_UFOPEDIA: "這種生物的核心極度高溫，似乎兼任消化系統的功能。牠獨特的肌肉系統具有極大的力量與速度。其岩石般的外皮對火焰或燃燒彈毫不畏懼。"
  STR_CHRYSSALID_UFOPEDIA: "這種生物螃蟹般的鉗爪是近戰中的可怕武器。極高的新陳代謝率與強壯體格賦予牠驚人的速度與靈巧。牠不會直接殺死獵物，而是植入一枚卵並注入毒液，使受害者變為行走的活僵屍；在被植入後不久，一隻新的蟹形蟲便會破體而出。蟹形蟲與蛇人種族關係密切。"
  STR_CHRYSSALID_AUTOPSY_UFOPEDIA: "這種生物的外骨骼極為堅韌，卻意外地對爆炸性彈藥相當脆弱。大腦發育完整，細胞生長速度極快。牠體內帶有二十枚卵，會將這些卵植入其他有機體之中。這種生物是極為有效的恐怖武器。"
  STR_FLOATER_UFOPEDIA: "浮游者主要擔任士兵與恐怖份子。牠們本就是天生的掠食性生物，經由基因工程與機械強化後，被改造成可怕的戰士。牠們下半身與大部分內臟器官皆已被外科手術摘除，並裝上一套維生系統；該植入裝置內含反重力單元，使其能在空中飄浮，儘管姿態並不穩定。"
  STR_FLOATER_AUTOPSY_UFOPEDIA: "這種生物已被外科手術徹底改造。位於身體中央、構成其核心的裝置是一套維生系統，接管了心臟、肺臟與消化系統的所有功能。這使得牠能在極端嚴苛的環境下存活。牠的大腦比人類略小，但感覺器官十分發達。"
  STR_REAPER_UFOPEDIA: "這種雙足肉食生物擁有強而有力的顎與貪婪的食慾。牠的腦部植入了多具裝置，用以操控其行動。這種生物原始的掠食本能除了製造恐慌與破壞之外別無他用。收割者通常與浮游者結伴出現。"
  STR_REAPER_AUTOPSY_UFOPEDIA: "收割者體內有兩具「腦」與兩具「心臟」，即使身受重傷仍能繼續行動。然而牠覆滿毛皮的外皮極易燃燒，使其對燃燒彈藥相當脆弱。"
  STR_SECTOPOD_UFOPEDIA: "腦機甲是一種搭載強力雷射光束武器的機械生物。對這些機械野獸的操控，是透過與靈體（其操控者）之間的心電連結來達成。腦機甲是外星部隊手中最強大的恐怖武器。"
  STR_SECTOPOD_AUTOPSY_UFOPEDIA: "這具機械人造型穩固，配備可抵禦多數攻擊形式的動力裝甲，尤其善於抵抗電漿武器。然而其感應電路對雷射武器似乎特別脆弱。"
  STR_CYBERDISC_UFOPEDIA: "這種小型飛碟是裝備強力電漿光束的自動化恐怖武器。反重力推進系統使其在崎嶇地形下擁有極大優勢。牠的首要任務是替腦蟲種族製造破壞與恐慌。"
  STR_CYBERDISC_AUTOPSY_UFOPEDIA: "電腦碟外殼防護完善，特別擅長抵擋爆炸性彈藥。其核心的反重力系統損毀過於嚴重，我們無法對其運作原理進行任何深入了解。"
