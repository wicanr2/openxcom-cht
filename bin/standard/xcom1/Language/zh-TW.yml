  # === Mission briefings (short) ===
  STR_UFO_CRASH_RECOVERY_BRIEFING: "保持警戒 — 幽浮內或墜毀地點周圍可能有敵人。當所有敵方單位被消滅或中和時任務成功。屆時可開始回收幽浮殘骸、器物與外星屍體。中止任務請將 X-Com 探員帶回運輸載具並點擊「中止任務」圖示。"
  STR_UFO_GROUND_ASSAULT_BRIEFING: "探索降落地點，如可能進入幽浮。當所有敵方單位被消滅或中和時任務成功。屆時可開始回收幽浮、器物與外星屍體。中止任務請將 X-Com 探員帶回運輸載具並點擊「中止任務」圖示。"
  STR_BASE_DEFENSE_BRIEFING: "外星船艦已降落附近。我方基地處於極大危險。依標準程序所有非戰鬥人員與 X-Com 載具已撤離。外星單位將從機庫門或進入升降梯進入基地。請不惜代價守住基地與其關鍵設施 — 這是場決死戰。若點擊「中止任務」圖示則視為投降並失去基地。"
  STR_ALIEN_BASE_ASSAULT_BRIEFING: "X-Com 探員已進入外星基地。必須摧毀控制中心使基地停止運作。當所有敵人被消滅，或小隊回到綠色出口區域（點擊「中止任務」圖示逃離）時任務結束。"
  STR_CYDONIA_BRIEFING: "你抵達了賽多尼亞。你進入火星人面像附近的巨大地下複合體。你必須摧毀控制所有外星活動的外星人腦。人類存亡掌握在你手中..."
  STR_TERROR_MISSION_BRIEFING: "當所有敵方單位被消滅或中和時任務成功。你必須消滅外星威脅以拯救區域內平民性命。中止任務請將 X-Com 探員帶回運輸載具並點擊「中止任務」圖示。"
  STR_MARS_CYDONIA_LANDING_BRIEFING: "你的復仇者載具已降落在火星表面的賽多尼亞區域。我們的情報顯示其中一座金字塔內含一個通往地下複合體的綠色升降梯。當所有士兵集合於升降梯區域時，點擊「中止任務」圖示進入下一階段。"
  STR_MARS_THE_FINAL_ASSAULT_BRIEFING: "金字塔升降梯將你疲憊的士兵帶往行星深處。他們抵達一個巨大隧道與廳室複合體的中心。外星人腦藏匿在迷宮的某處。必須將其摧毀，方能拯救地球免於外星奴役。{NEWLINE}{NEWLINE}祝你好運！"

