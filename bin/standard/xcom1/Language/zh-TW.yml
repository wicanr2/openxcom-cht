  STR_BLASTER_LAUNCHER_UFOPEDIA: "本武器為外星人的導引飛彈發射器，可發射威力強大的「破壞彈」。點擊發射時，會依序為破壞彈設定「航點」；待你布下足夠的航點後，再點擊專屬的發射圖示即可。"
  STR_ALIEN_GRENADE_UFOPEDIA: "本裝置的運作原理與地球的手榴彈相同——只是威力更為強大。"
  STR_HEAVY_PLASMA_CLIP_UFOPEDIA: "本款精巧裝置為重型電漿槍的彈藥，內含少量的太陽神物質。"
  STR_PLASMA_RIFLE_CLIP_UFOPEDIA: "這個小型物件為電漿步槍——一種中等威力的外星武器——所使用的能量源，內含少量的太陽神物質。"
  STR_PLASMA_PISTOL_CLIP_UFOPEDIA: "供小型外星電漿手槍使用的能量源。內含太陽神物質——所有外星科技動力的根源。"
  STR_STUN_BOMB_UFOPEDIA: "昏迷彈用於活捕人類樣本，但對絕大多數外星種族同樣有效。它由小型發射器發射。"
  STR_ELECTRO_FLARE_UFOPEDIA: "本款精巧裝置擲出後會發出明亮的閃光，可於夜間任務中突顯電子照明彈附近的敵方單位。"
  STR_BLASTER_BOMB_UFOPEDIA: "本裝置為一枚高爆性飛彈，配備智慧導引系統，由破壞彈發射器發射。"
  STR_AVENGER_UFOPEDIA: "運輸與戰鬥兼用的太空飛行器。對外星科技的終極複製成果。"
  STR_INTERCEPTOR_UFOPEDIA: "搭載雙具脈衝爆震引擎並具備特殊電磁屏蔽電子系統的戰鬥機，為目前以地球為基礎的最頂尖技術所打造。"
  STR_LIGHTNING_UFOPEDIA: "運輸與戰鬥兼用的飛行器。粗糙但有效地複製了外星推進系統。"
  STR_SKYRANGER_UFOPEDIA: "兵員運輸機。同類機型中最快的一款，並具備垂直起降（V.T.O.L.）能力。"
  STR_FIRESTORM_UFOPEDIA: "戰鬥型飛行器。這款單人戰機複製了經典的外星飛碟造型，中央配置一具推進單元。"
  STR_CANNON_UFOPEDIA: "高威力機炮，可發射穿甲彈，能貫穿 16 英吋厚的鋼板。"
  STR_FUSION_BALL_UFOPEDIA: "本款發射器發射球狀飛彈，以反物質反應為動力。彈體將以重力波內爆的方式摧毀目標。"
  STR_TANK_CANNON_UFOPEDIA: "自動化重型武器平台旨在輔助 X-Com 小隊作戰。其強大火力與堅實裝甲使其在開闊地形的火力戰中極具價值。請確保倉庫內備有足夠的加農炮彈，以便為坦克補給彈藥。當你將其編入小隊時，系統會自動為其裝填彈藥。"
  STR_TANK_ROCKET_LAUNCHER_UFOPEDIA: "這款自動化重型武器平台配備了威力強大的火箭，對任何外星敵人都將造成毀滅性打擊。請確保倉庫內備有充足的 HWP 火箭。"
  STR_TANK_LASER_CANNON_UFOPEDIA: "雷射武器是 HWP 的實用補強。它兼具強大火力，又無需顧慮彈藥補給。"
  STR_HOVERTANK_PLASMA_UFOPEDIA: "外星科技賦予了 HWP 全新的生命力。空中機動的靈活性加上電漿光束的威力，是一組致命的組合。"
  STR_HOVERTANK_LAUNCHER_UFOPEDIA: "本款懸浮坦克配備融合彈發射器，可造成驚人的毀滅效果，使用時請格外謹慎。你必須自行製造融合彈，以維持這類 HWP 的滿載彈藥。融合彈是一種智慧導引武器；使用時，以游標選擇若干「航點」，再點擊發射圖示即可發射融合彈。"
  STR_ACCESS_LIFT_UFOPEDIA: "出入電梯負責將裝備與人員運送進出地下基地。新基地動工時，它永遠是第一座興建的設施。電梯區域容易遭到潛在敵對勢力的入侵。"
  STR_LIVING_QUARTERS_UFOPEDIA: "每座宿舍可容納最多 50 名人員，提供基本的休閒、餐飲與睡眠空間。"
  STR_LABORATORY_UFOPEDIA: "每座實驗室可容納最多 50 名科學家。實驗室配備最新科技，可進行材料、生化與宇宙學等領域的研究，並享有全球最頂尖實驗室——包括軍方機構——的特權存取權限。"
  STR_WORKSHOP_UFOPEDIA: "工坊內備有依據實驗室設計圖製造各類裝備所需的全套設備。每座工坊可容納最多 50 名工程師，但在建物品也會佔用一部分空間。"
  STR_SMALL_RADAR_SYSTEM_UFOPEDIA: "小型偵測系統的有效雷達範圍為 300 海里，並可連結衛星系統進行地面搜索。每套系統每 30 分鐘有 10% 的機率偵測到一個平均大小的物體。"
  STR_LARGE_RADAR_SYSTEM_UFOPEDIA: "大型偵測系統的有效範圍為 450 海里，並可連結衛星系統進行地面搜索。每套系統每 30 分鐘有 20% 的機率偵測到一個平均大小的物體。"
  STR_MISSILE_DEFENSES_UFOPEDIA: "飛彈防禦系統可在敵機嘗試於基地附近降落時提供部分防護。"
  STR_GENERAL_STORES_UFOPEDIA: "所有裝備、武器系統、彈藥、回收物資與重型武器平台都會存放於倉庫中，包括已指派給機庫內飛行器的裝備。"
  STR_ALIEN_CONTAINMENT_UFOPEDIA: "活體外星人很可能需要特殊的棲息環境以維持生命機能。本款收容設施可在獨立式單位中收容最多 10 隻外星生物。"
  STR_PLASMA_DEFENSES_UFOPEDIA: "電漿光束防禦系統可在敵機入侵時提供強大且高效的防護。"
  STR_FUSION_BALL_DEFENSES_UFOPEDIA: "融合飛彈是抵禦外星攻擊最有效的防禦手段。這類飛彈會引發反物質內爆，將特定半徑內的一切徹底摧毀。"
  STR_GRAV_SHIELD_UFOPEDIA: "重力護盾能將試圖於基地附近降落的外星飛行器擊退一段時間，足以讓所有防禦系統再度開火。實際效果上，這將使基地任何防禦系統的效能加倍。"
  STR_MIND_SHIELD_UFOPEDIA: "由於外星飛行器仰賴腦波偵測人類的存在，最有效的反制手段便是屏蔽基地的腦波訊號。本設施將大幅降低基地被外星飛行器偵測到的機率。"
  STR_PSIONIC_LABORATORY_UFOPEDIA: "心靈實驗室可評估基地內所有士兵的心靈潛能，並提供必要訓練以發揮其心靈技能。每座實驗室一次可訓練最多十名士兵；訓練成果於每月月底結算。心靈技能搭配心靈擴大器使用，可於戰鬥中發動心靈攻擊。"
  STR_HYPER_WAVE_DECODER_UFOPEDIA: "外星通訊仰賴一種超維度波傳遞，傳輸幾乎是瞬時完成的。本解碼設施可攔截 UFO 的訊息並解析其內容，顯示 UFO 類型、外星種族與任務性質。"
  STR_HANGAR_UFOPEDIA: "每座機庫可容納一架飛行器，並備有 X-Com 飛行器所需的維修、加油與修復設施。駐紮於基地的每一架飛行器都必須有一座專屬機庫，即使該機正在執行任務，這座機庫也無法供其他飛行器使用。"
  STR_UFO_POWER_SOURCE_UFOPEDIA: "外星飛行器的能量源為一座反物質反應爐，以太陽神物質（元素編號 115）製造強大的重力波及其他形式的能量。其質能轉換效率高達驚人的 99%，因此極少量的太陽神物質便可產生龐大的能量。本單元可使用外星合金輕易複製生產。"
  STR_UFO_NAVIGATION_UFOPEDIA: "外星飛行器使用精密電腦在地球與外太空中導航。本系統以光學處理器構成的網路為基礎；操控介面相對簡易——導航者控制由能量源產生的重力波方向，藉此驅動飛行器朝任意方向移動。本系統人類可輕易上手操作，並可利用外星合金與其他元件複製生產。"
  STR_UFO_CONSTRUCTION_UFOPEDIA: "外星飛行器由三大主要元件構成——能量源、導航系統，以及由外星合金打造而成的船殼。船殼經過特殊設計，可引導並控制重力波的方向。此外還需要少量的太陽神物質做為能量源的燃料。一旦掌握其建造原理並了解各元件功能，便能自行打造此類飛行器。"
  STR_ALIEN_FOOD_UFOPEDIA: "這些艙室內含多種酵素，可用於消化牲畜、其他動物乃至人類的肢體部位。處理後的液體即可作為已預先消化的食物被吸收——很可能直接進入血液循環。這顯示外星人對地球存在一定的依賴——一種地球與外星社會之間的共生關係。"
  STR_ALIEN_REPRODUCTION_UFOPEDIA: "這些艙室中存有外星人的胎兒。容器的設計似乎顯示，使用此一流程的外星種族完全依靠實驗室方式繁衍。豐富的營養物質確保胎兒迅速發育，這套生產線式的系統能在短時間內製造出數以千計的外星克隆體。該流程稍加調整即可應用於人類繁殖，或外星與人類的混種繁殖。"
  STR_ALIEN_ENTERTAINMENT_UFOPEDIA: "這些球體最可能的功能是娛樂用途。其心靈迴路會刺激大腦的各個區域，效果類似致幻藥物。這也是我們目前唯一發現外星人擁有任何文化或休閒活動的證據。"
  STR_ALIEN_SURGERY_UFOPEDIA: "這套外科器具利用雷射切割機從牲畜與其他動物身上摘取特定部位。各地頻傳的牲畜肢解事件，皆可由這種詭異的外星行為加以解釋。這些部位可能用於營養補給或基因相關用途。"
  STR_EXAMINATION_ROOM_UFOPEDIA: "過去多年來，已有數以千計的人聲稱遭外星人綁架，有些人甚至反覆遭遇。事實遠比這恐怖得多——人類被綁架、研究並監控。最佳樣本會被提取基因素材；女性則被植入外星人與人類的混種胎兒，再於數月後將其取出。外星人究竟懷有什麼不可告人的險惡意圖，誰也不曉得？"
  STR_ALIEN_ALLOYS_UFOPEDIA: "外星飛行器由具有獨特性能的特殊合金打造而成。其質地極為輕盈而堅固，並可透過電磁方式塑形。這種材料可被複製生產，並運用於多種製造流程之中。"
  STR_ELERIUM_115_UFOPEDIA: "本元素具有不尋常的特性——在受到特定粒子轟擊時，會產生反物質動力，進而引發重力波及其他形式的能量。它並非太陽系內天然存在的物質，亦無法被複製生產。"
  STR_ALIEN_RESEARCH_UFOPEDIA: "外星研究任務用於蒐集地球及其居民的基本資料。任務多以小型載具執行，偶爾於荒涼地區降落。這類外星活動對 X-Com 構成的威脅最低，各國政府與民眾也鮮少對此產生憂慮。"
  STR_ALIEN_HARVEST_UFOPEDIA: "外星人對地球的動物群有多種用途。動物會被秘密綁架，再被送回，並已遭摘除多種器官。目擊 UFO 的案例中常伴隨牲畜遭肢解的報告。這類外星活動會引起各國政府的高度憂慮，並在民眾間造成相當大的不安。此類活動主要發生於農牧區。「外星收割」的理論認為，外星種族曾於史前年代將動植物群「播種」到地球上，如今則回頭收割自己當年所播下的果實。"
  STR_ALIEN_ABDUCTION_UFOPEDIA: "這是最險惡的一種外星活動。儘管外星人會試圖抹除受害者對該段經歷的記憶，遭外星人綁架的事件仍被廣泛報導。受害者陳述自己遭受了羞辱性的身體檢查，包括植入外星胎兒及種種詭異的基因實驗。這類活動的目的似乎與外星人本身基因素材的突變及操弄有關。這類事件會引發極大的恐慌，並多發生於人口密集區或城市之中。"
  STR_ALIEN_INFILTRATION_UFOPEDIA: "地球各國政府可能會遭外貌酷似人類的外星情報員滲透，進而導致外星人與政府高層之間出現官方接觸。此類活動到了高峰期，會伴隨大型城市附近高度集中的 UFO 出沒現象。外星人會試圖以分享高等科技為條件，與某國政府簽訂條約；做為交換，該國政府將容許外星人不受干涉地進行各項活動。這類外星任務對 X-Com 構成最嚴重的威脅——一旦某國同意簽訂條約，其資助便將立即終止。"
  STR_ALIEN_BASE_UFOPEDIA: "外星人會在偏遠地區秘密建造地下基地。在進行若干偵察飛行後，在基地興建期間，當地將出現一連串密集的 UFO 活動。已知這類基地內含實驗性質的人類綁架實驗室，並儲存著該區域後續活動所需的補給物資。外星基地的存在會引發大量外星活動報告，卻不見 UFO 蹤跡。要定位這類基地，X-Com 飛行器必須在某一區域巡邏數小時，才有一定機率偵測到。"
  STR_ALIEN_TERROR_UFOPEDIA: "外星人在城市發動恐怖攻擊時，會派出擁有可怕能力的特殊部隊。平民將直接遭受威脅，各國政府也將被迫疏散整片區域。這類行動的主要目的，是製造足夠的社會恐慌，迫使各國政府向 X-Com 計畫施壓。"
  STR_ALIEN_RETALIATION_UFOPEDIA: "若 X-Com 攔截機在擊落 UFO 上表現得格外出色，外星人可能會採取若干報復行動，例如對 X-Com 基地展開直接攻擊。然而外星人必須先找到 X-Com 基地才有辦法發動攻擊；只要 UFO 都被擋在外圍，遭受攻擊的危險便相對微小。"
  STR_ALIEN_SUPPLY_UFOPEDIA: "外星基地一旦建成，便會由專屬的補給艦定期進行補給。若於降落途中偵測到這類補給艦，則幾乎可以確定附近就有一座外星基地。"
  STR_SMALL_SCOUT_UFOPEDIA: "這款小型飛行器主要用於偵察或研究任務。在外星任務開始時，它通常會先於大型載具現身。"
  STR_MEDIUM_SCOUT_UFOPEDIA: "中型偵察艦，對地球部隊威脅有限。任務中通常會於大型載具之前先行現身。"
  STR_LARGE_SCOUT_UFOPEDIA: "最大型的外星偵察飛行器，是一款通用型載具，會出現在各種類型的外星任務中。"
  STR_HARVESTER_UFOPEDIA: "收割艦底部設有暗門，並配備吊掛裝置，可將牲畜或其他動物拉上船。雷射切割機用於摘取所需的素材，剩下的屍體則被棄置於地面。船內另設有用於存放肢體部位的儲存櫃。"
  STR_ABDUCTOR_UFOPEDIA: "本艦配備可對人類受試者進行恐怖實驗的檢驗室。受害者通常會被外星人的心靈能力麻痺，但在手術台上仍會保持清醒。"
  STR_TERROR_SHIP_UFOPEDIA: "恐怖艦配備收容設施，可收容大型的外星恐怖武器或生物，並用於將這些外星恐怖份子運送至人口密集區。"
  STR_BATTLESHIP_UFOPEDIA: "戰艦是體型最龐大、火力最強悍的外星飛行器，通常是外星任務的主力載具，配備強大武器並搭載眾多船員。"
  STR_SUPPLY_SHIP_UFOPEDIA: "補給艦用於外星基地的興建工程，或對既有基地進行補給作業，船內載運外星食物容器與繁殖艙體。"
  STR_POWER_SUIT_UFOPEDIA: "本款強大的全新護甲以太陽神能量源驅動，可大幅提升穿戴者的速度與力量，為作戰部隊提供目前最頂級的防護。"
  STR_FLYING_SUIT_UFOPEDIA: "動力裝甲的強化版本，整合了外星反重力導航技術，使穿戴者能在戰場上享有完全自由的機動性。"

