  STR_MIND_PROBE_UFOPEDIA: "心靈探測器是一種外星通訊裝置，可直接從腦波中讀取資訊。X-Com 單位可於戰鬥中使用此裝置以顯示外星人的屬性資料。請點擊心靈探測器，再選擇「使用」選項，接著以游標點選欲探測的外星人。"
