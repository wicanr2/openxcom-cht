  STR_LASER_PISTOL_UFOPEDIA: "雷射手槍是新技術的有效應用範例。它擁有手槍的便利性，並具備更快、更精準的射擊表現。"
  STR_LASER_RIFLE_UFOPEDIA: "雷射步槍是稍早雷射手槍設計的強化版本，威力更大、精準度更高。"
