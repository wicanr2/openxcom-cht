  # ============================================================

  # === 開場敘事 (INTRO) ===
  STR_INTRO_1: "Copyright 1995 MicroProse"
  STR_INTRO_2: "火星：賽多尼亞的崩落。"
  STR_INTRO_3: "凱旋的 X-Com 摧毀了外星戰爭機器的核心，正升空返航。然而，這座荒廢的火星基地內，並非萬物俱寂。"
  STR_INTRO_4: "一道強大的迅子束自賽多尼亞神經中樞的廢墟竄出，劃破虛空—它的目的地⋯⋯"
  STR_INTRO_5: "地球。"
  STR_INTRO_6: "深海之中，光束擊中一具沉睡已久的接收器。龐大的休眠電腦開始甦醒。在人類目光無法及的深淵，無數沉睡的外星人巨室啟動了漫長的復甦循環。"
  STR_INTRO_7: "公元 2040 年：地球早已遺忘外星戰爭的恐怖。但在海洋深處被遺落且隱藏的角落，外星大軍已整裝待發—準備推翻人類，接管世界。"
  STR_INTRO_8: "外星人對人類發動攻擊；尋找其扭曲實驗的樣本；劫掠全球的珍貴礦物與資源；並從海底大肆搜刮。隨後，外星人將目光投向了海面之上。"
  STR_INTRO_9: "造型詭異的強力飛行潛艇航行於大洋之間—觀察、搜索、獵殺⋯⋯"
  STR_INTRO_10: "找到獵物，便發動攻擊。"
  STR_INTRO_11: "詭異的新式武器加諸於毫無防備的世界。我們完全任由外星威脅宰割。{NEWLINE}唯一能拯救我們的組織—我們卻早已棄之不顧⋯⋯"
  STR_INTRO_12: "X-COM 水下實驗設施"
  STR_INTRO_13: "「求救！求救！」「這裡是跨大西洋客輪海皮里恩號。」「我們正遭受攻擊。」「求救！求救⋯⋯⋯」"
  STR_INTRO_14: "「指揮中心呼叫一號潛艇庫：開啟海門」、「派出梭魚 01。我們遭遇外星攻擊—紅色警戒」。{NEWLINE}「重複：紅色警戒。」"
  STR_INTRO_15: "外星人冷酷而高效⋯⋯"
  STR_INTRO_16: "⋯⋯射擊精準從不失手。"
  STR_INTRO_17: "「梭魚 01 呼叫基地」—「正接近海皮里恩號殘骸」。"
  STR_INTRO_18: "「減速中。」{NEWLINE}「兩公尺」{NEWLINE}「一公尺」{NEWLINE}「所有水兵準備立即出擊。」"
  STR_INTRO_19: "⋯⋯「氣閘已淨空」⋯⋯「正接近殘骸」。{NEWLINE}「我的天！」{NEWLINE}「你看到我頭盔攝影機上拍到的那些生物了嗎？」"

  # === 失敗結局 (GAMEOVER) — 玩家輸掉戰役的劇情段 ===
  STR_GAMEOVER_1: "我們失敗了，外星人毀滅了我們最後的救贖之望。{NEWLINE}X-Com 已被摧毀，地球臣服於這個古老敵人腳下。"
  STR_GAMEOVER_2: "賽爾斯轟鳴著升入平流層，並開始橫掃整個世界，散播死亡並收割人類遺族。在其腹中深處，殘暴的外星心智正甦醒。"
  STR_GAMEOVER_3: "各國首都中，絕望的計畫被倉促擬定。然而一切徒勞無功—失去了 X-Com 研究計畫所帶來的科技，我們的武器毫無用處。"
  STR_GAMEOVER_4: "外星人在兩極冰冠建立基地，並開始融化冰層，整個世界將化為汪洋。倖存的人類被一一押送，被用於為外星人未知目的服務的卑劣繁殖實驗。天空昏暗，巨大的瘟疫席捲大地。"
  STR_GAMEOVER_5: "面對這個新世界秩序我們無從抵抗，膽敢嘗試者只能慘死於難以理解的外星武器之下。對其餘的人而言，連這種解脫都是奢望—母親地球已成外星世界，人類沉沒於一場匍匐蔓延的恐懼之下。"

  # === 主線 UFOPEDIA — Z 元素 / 賽爾斯 / 外星潛艇結構 ===
  STR_TLETH_THE_ALIEN_CITY: "賽爾斯，外星人之城"
  STR_TLETH_THE_ALIEN_CITY_UFOPEDIA: "賽爾斯，這艘巨大的外星殖民母艦深埋於墨西哥灣的西格斯比深淵之中。在城市的中心，蟄伏著一個外星恐怖存在—邪惡而強大，連死亡都無法將其攫取。在一間外星金屬構築的密室裡，沉睡著偉大夢者—終極外星人的形體。將賽爾斯升出海面便會啟動牠的復甦循環，一旦復甦，將無人能擋。雖非真正活著，卻也並未死去，這個外星心智操控著整支外星大軍。詭異的分子控制科技將所有外星人連結至這個唯一心智，而這個唯一心智也連向所有外星人。經基因突變的外星人/人類胎兒為外星心智提供能源，並形成統治者與其臣民之間的紐帶。終極外星人的傳說已存在於人類心中數百年，海洋始終隱藏著這個終極真相。"
  STR_ZRBITE_UFOPEDIA: "這是一種外星起源的合金，部分為黃金、部分為外星生物物質。作為動力源使用時，少量便能產生比體積大十倍的核能單元更多的能量。其大部分組成元素皆來自外星，已超出我們的技術能力複製重現。"
  STR_ALIEN_SUB_CONSTRUCTION_UFOPEDIA: "每艘船艦皆具有變色龍般的構造，仔細仿照海洋生物外觀，並以水中塑料製成。每艘潛艇都如同一個生命體：船員與載具和諧合一。其中大部分系統皆可被我們複製，並可衍生出一種混合技術，使我們得以在科技層級上迎頭趕上。"
  STR_MAGNETIC_NAVIGATION_UFOPEDIA: "這些單元可產生球形多層磁場，可投射至潛艇周圍 1000 公尺範圍。外星導航員直接連接至機器，憑藉這個無形的水下世界感知方位。介面系統使用經外星人改造的大腦皮質組織，透過神經連結直接與操作者的腦部通訊。"

  # === 物種 UFOPEDIA — 主要敵人介紹 + 解剖 ===
  STR_AQUATOID_UFOPEDIA: "水生人是一個古老的種族，遠在人類踏出最初顫顫巍巍的第一步前數千年便已存在。其矮小緊湊的身形與球狀特徵，可追溯至牠們在宇宙中漫遊的兄弟—腦蟲人。其力量基於強大的分子控制科技。水生人試圖透過基因改造延續其無法自然繁衍的種族，理想的實驗對象正是人類。實驗已誕生了眾多混血種族。"
  STR_AQUATOID_AUTOPSY_UFOPEDIA: "對此生物的詳細分析讓我們得以提出若干基本假設。牠正是我們昔日的敵人—腦蟲人，但已被外科手段與植入物改造為水生生物。退化的肺部允許其呼吸空氣，並具備有限的水面活動能力。全身遍布電子植入物，強化了萎縮肢體的力量與器官的機能。由於該族群所有個體完全相同，我們可推測這些生物乃是複製體。"
  STR_GILLMAN_UFOPEDIA: "近乎人類的奇異生物，看似爬蟲類人形，與人類關係極為緊密。這種生物在水下世界中極為強悍迅捷。魚鰓人是個完整的種族，具有不同年齡的雄性與雌性個體。牠們與多數水下外星生物截然不同—身上完全沒有基因改造或外科變形的痕跡。我們所看到的，或許正是我們自身物種的某個古老分支。"
  STR_GILLMAN_AUTOPSY_UFOPEDIA: "手術一開始便清楚顯示：這並非外星人，而是地球本土生物—一個古老的史前種族，曾被認為在哺乳類取得主宰地位的那一刻便已滅絕。在恐龍橫行大地的時代，這些生物—魚鰓人—已然存活：兩棲、智慧、強壯。終結爬蟲類統治本星的那場浩劫，迫使這些生物與新到的外星人形成共生關係。一個小型電子裝置嵌於牠們的顱骨之中。"
  STR_LOBSTERMAN_UFOPEDIA: "這是一個令人震驚的生物，比人類更高大，擁有六肢，外型猶如水中惡魔。此生物與地球龍蝦的相似性，使其在 X-Com 部隊中被戲稱為「龍蝦人」。這是深淵中的巨獸—一個被精心設計的戰鬥生物，力量驚人，幾乎對火器免疫。光是牠的鉗子就足以碾碎鋼鐵。"
  STR_LOBSTERMAN_AUTOPSY_UFOPEDIA: "突破其幾乎不可破壞的外殼後，此生物的構造令人驚嘆。強大的肌肉繞著一副堅硬合金骨架起伏，一個具備多波段掃描能力的精密目標瞄準系統直接連入生物的腦部。複眼受到比鋼還硬的塑料保護。顯然當這些生物由其主人妥善部署時，幾乎無人能擋。其體內深處埋藏著結構與功能皆未知的裝置。"
  STR_TASOTH_UFOPEDIA: "這些敏捷迅速的敵人是外星大軍的主力。數以百計的個體在外星殖民地深處的巨大繁殖槽中誕生。塔索斯的力量遠勝人類，是真正的外星生物—其行為與肉食天性在本星球上無可匹敵。塔索斯常擔任外星攻擊的先鋒，即使面對壓倒性的劣勢，似乎也從不退縮。"
  STR_TASOTH_AUTOPSY_UFOPEDIA: "解剖揭示這是一種具備奇異力量的電子生物有機體。體腔內有一個小型動力單元，但找不出任何可辨識的器官。能量透過生物電傳輸系統散布全身。整個軀體缺少骨骼或任何支撐結構。一旦死亡，能量便會停止，生物便化為一團毫無生氣、滲漏外星血肉與液體的破布娃娃。體內唯一的其他構造是一對陶瓷電池—若短暫通電，可使生物短暫復甦。"
  STR_DEEP_ONE_UFOPEDIA: "深淵者是一場生物學的噩夢—一個混種生物，由水生人的扭曲心智實驗所製造。我們曾遭遇此生物的數種變異。經廣泛研究後，我們認定這些是入侵者所製造的—在獲得新鮮人類樣本後用以擴充其陣容。每隻這種次人類都配備了威力足以擊殺一名水兵的電擊放電能力。"
  STR_DEEP_ONE_AUTOPSY_UFOPEDIA: "此生物是人類與外星有機體的嫁接產物。人類大腦被大規模改造，以容納控制電子設備與外星皮質。人類軀體的所有殘跡似乎都已消失，唯獨保留了一項：雙眼。外科嫁接似乎允許外星胎兒在成長過程中吞噬其人類宿主。此生物堅韌的皮膚似乎是一種非有機的金屬網—極為強韌且具彈性。其產生的混種強壯、迅捷，且完全受外星人控制。"
  STR_BIODRONE_UFOPEDIA: "生物無人機是唯有外星心智才能構想出的造物。它是一個大腦（人類或外星人），懸浮於羊水之中，連接至一個動力基座，可於陸地或水下飛行。每架生物無人機皆配備強大的聲波擾亂器，半機械半生物。我方部分科學家推測此武器可能是由宿主原有的聲帶所驅動。這些「超級看門狗」精準而頑強，外星人廣泛使用牠們來保護重要資產。"
  STR_BIODRONE_AUTOPSY_UFOPEDIA: "「聲波擾亂器是生物裝置」的假設已獲證實—這個不幸的生物字面意義上是用尖叫殺死敵人。每一個樣本都有大規模的外科手術創傷疤痕，並嚴重殘缺。外星人似乎是用屠宰的方式逼迫大腦服從。用於這些生物的皮質大多源於外星，但沒什麼比發現一具以人類為基底的個體更令人毛骨悚然。生物無人機由離子引擎驅動，並內建某種遠端遙控系統。"
  STR_TENTACULAT_UFOPEDIA: "即使是洛夫克拉夫特噩夢的深淵也孕育不出這般難以言喻的生物。地球上任何動物都無法與之相比，能誕生此物的環境超乎想像。觸手怪以長觸手裝備，能麻痺受害者並將其轉化為無心智的爪牙。這些後代僅憑碰觸便能致死，連護甲也無法阻擋。觸手怪是 X-Com 至今所遭遇最令人畏懼的外星生物。"
  STR_TENTACULAT_AUTOPSY_UFOPEDIA: "解剖揭示其碩大的大腦中嵌入了小型電子植入物。其視覺系統是可見光與熱影像獲取的複雜組合—即使在墨黑的深海中，此怪物也能精準導航。體內存在著退化的器官，似乎僅能維持最低限度的生存。每隻生物都有一個小型胃囊，並接有一個外部連接器，合理推斷此生物由其主人直接以營養素供給。"
  STR_CALCINITE_UFOPEDIA: "如同失蹤水手的潛水服一般，這些外星生物潛伏於海床上獵捕粗心之人。其比鋼還強的爪子一擊揮砍，便足以將最優秀的潛水員送入海底。在面罩內可見一團綠色膠狀物在翻攪。我們多次與牠們致命的接觸中，從未得以一窺其真實形貌。"
  STR_CALCINITE_AUTOPSY_UFOPEDIA: "剝除裝甲服後，鈣化體顯露出真面目—一團巨大、無定形的原生質。看不見大腦、肢體或任何感覺器官，僅在液態體內深處有一個小型金屬構件。一旦死亡，我們只能對此生物的本質作出猜測。這是我們外星敵人一個無法解釋的謎團。"
  STR_TRISCENE_UFOPEDIA: "這種兩足爬蟲類是恐龍時代的活化石。在各方面看來都像是白堊紀的生物，唯一例外是它兼具水陸生存能力。這些生物身上掛載著武器吊艙，顎部排列著巨大的金屬牙齒。當外星人發動陸上攻擊時，這些怪獸往往是攻擊部隊的核心。作為一種重量級且強力的武器，塔索斯指揮官以致命的效率部署它們。"
  STR_TRISCENE_AUTOPSY_UFOPEDIA: "經科學家解剖後，三角龍顯示自己是一個古老的生物，被電子植入物與武器系統所增強。其微小的大腦由控制束帶上裝載的小型電腦模組輔助—所有此類生物皆配戴。堅韌的天然皮膚，加上由額外武器增強的掠食本能，使其在任何環境下都是致命的對手。"
  STR_HALLUCINOID_UFOPEDIA: "在收割了海洋之後，外星人培育出這些巨大的地球生物作為武器。當面對這些看似無害的深海漫遊者時，切勿被虛假的安全感所麻痺。具備近戰冰寒打擊能力的幻象生物是個致命的敵人。"
  STR_HALLUCINOID_AUTOPSY_UFOPEDIA: "在此生物膠狀軀體的多層之中，嵌套著一個強大的化學冷凍裝置，這便是其主要的攻擊能力。幻象生物柔軟有彈性的皮膚似乎對火焰攻擊極為脆弱。此突變體常與其主人—水生人—一同出沒。"
  STR_XARQUID_UFOPEDIA: "另一種經改造的地球無脊椎動物，薩奎是一個既美麗又危險的生物。這個迅速游動的龐然大物隱藏著毀滅性的武器庫—令人窒息的墨汁噴霧，以及離子化粒子衝擊波。自我們初次與此強大生物接觸以來，便對其威力及其控制者—復仇心切的魚鰓人—保持戒心。"
  STR_XARQUID_AUTOPSY_UFOPEDIA: "這隻過度發育的鸚鵡螺，是靠外星藥物與外科改造的「食譜」變得如此巨大。已被扭曲到超出自然範疇之外，魚鰓人為此生物加裝了機械控制系統，如今原本的天性已蕩然無存。作為一個有機武器平台部署，薩奎堅韌的外殼與機動性使其成為強大的對手。"
