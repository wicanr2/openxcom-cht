  STR_PLASTIC_AQUA_ARMOR_UFOPEDIA: "本裝甲採用新發現的外星物質「水中塑膠」，使我方水兵在面對外星侵略時有一搏之力。"
  STR_ION_ARMOR_UFOPEDIA: "新型水兵防護裝甲，以離子能源驅動，可大幅提升穿戴者的速度與力量，是戰鬥部隊目前最佳的防護。"
  STR_MAGNETIC_ION_ARMOR_UFOPEDIA: "離子裝甲的強化版，加入磁陣列科技，允許水中環境下完全自由的移動。"

