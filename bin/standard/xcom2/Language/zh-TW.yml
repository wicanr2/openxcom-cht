  # === Phase A: 8 段任務簡報 (玩家最高 visibility) ===
  STR_UFO_CRASH_RECOVERY_BRIEFING: "極度小心 — 外星潛艇內部與周圍可能仍有外星人。消滅或制伏所有敵方單位即可完成任務。隨後可開始回收外星潛艇殘骸、科技與外星屍體。要中止任務，請將水兵帶回潛艇，點選「中止任務」圖示。"
  STR_UFO_GROUND_ASSAULT_BRIEFING: "探查著陸地點，盡可能設法進入外星潛艇。消滅或制伏所有敵方單位即任務成功。隨後可回收外星潛艇、外星物品與屍體。要中止任務，請將水兵帶回潛艇，點選「中止任務」圖示。"
  STR_BASE_DEFENSE_BRIEFING: "外星載具已在附近著陸，本基地危在旦夕。依標準程序所有非戰鬥人員與可用 X-Com 潛艇已撤離。外星人將從潛艇塢閘門或氣密艙進入基地。請不惜一切代價守住基地與關鍵設施 — 這是死戰。若點選「中止任務」即等同認輸並失去基地。"
  STR_ALIEN_COLONY_P1_BRIEFING: "本次任務為突襲外星殖民地。基地分為兩層，請將所有水兵帶到第一層的發光出口，點選「中止任務」圖示進入第二層。遺留的裝備將留在海床上直到第二層解決為止。要放棄任務，請將水兵帶回潛艇並點選「中止任務」圖示。"
  STR_ALIEN_COLONY_P2_BRIEFING: "通過第一層、進入殖民地核心後，任務目標為摧毀控制中樞「辛諾米恩裝置」，或消滅所有外星人。要中止，請將所有水兵帶到起始點並點選「中止任務」圖示，所有可用 X-Com 裝備將帶回基地。"
  STR_PORT_TERROR_BRIEFING: "外星人對地面設施發動攻擊，港口與其中的平民身陷險境。你的小隊必須消滅所有外星人並保護無辜民眾。要放棄任務，請將水兵帶回潛艇並點選「中止任務」圖示。"
  STR_ISLAND_TERROR_BRIEFING: "外星人對地面設施發動攻擊，島嶼與其中的平民身陷險境。你的小隊必須消滅所有外星人並保護無辜民眾。要放棄任務，請將水兵帶回潛艇並點選「中止任務」圖示。"
  STR_SHIP_RESCUE_P1_BRIEFING: "本次為清剿任務 — 消滅船上所有外星單位，並保護船上平民的性命。外星人分散於甲板上下層，請先肅清上層再進入下層。要放棄任務，請將水兵帶回潛艇並點選「中止任務」圖示。"
  STR_SHIP_RESCUE_P2_BRIEFING: "上層甲板已肅清，現在前進到下層甲板。利用貨物升降梯下到貨艙。小隊必須消滅本層所有外星人才能完成任務。要中止，請將所有水兵帶到升降梯起始點並點選「中止任務」圖示。"
  STR_ARTIFACT_SITE_P1_BRIEFING: "本次任務為突襲一處新近啟用的外星通訊站。地點分為兩層 — 海床上的外星金字塔，以及隱藏的外星建築。請將所有水兵帶到建築入口並點選「中止任務」圖示進入下一階段。要放棄任務，請將水兵帶回潛艇並點選「中止任務」圖示。"
  STR_ARTIFACT_SITE_P2_BRIEFING: "突破外星建築進入建築群後，任務目標明確 — 滲透至外星設施核心並摧毀「辛諾米恩」分子控制裝置以完成任務。要中止，請將所有水兵帶到出入升降梯起始點並點選「中止任務」圖示。"
  STR_TLETH_P1_BRIEFING: "我們正進入未知領域，從此刻起任何狀況都可能發生。已知外星城市還有兩層，小隊必須衝向本層的出口以進入下一層。將所有水兵帶到出口並點選「中止任務」圖示前進。在其他位置中止將直接結束任務。"
  STR_TLETH_P2_BRIEFING: "更深入未知領域，從此刻起任何狀況都可能發生。已知外星城市還有一層，小隊必須衝向本層的出口以進入下一層。將所有水兵帶到出口並點選「中止任務」圖示前進。在其他位置中止將直接結束任務。"
  STR_TLETH_P3_BRIEFING: "終局在望 — 從此刻起我們要找出終極外星人的墓室。摧毀通往墓穴的 8 條能量管線即可終結外星威脅。別在此時放棄！中止將直接結束任務。"

  # === Phase B: UFOPEDIA 短條目 (< 250 字) ===
  # 潛艇 / 載具
  STR_LEVIATHAN_UFOPEDIA: "兼具運輸與攔截功能的飛行潛艇，具有極限深度作戰能力。結合外星與人類科技的傑作，採用離子推進系統與磁陣列導航。"
  STR_BARRACUDA_UFOPEDIA: "英國海水空間的「梭魚號」，以超熱雷射引擎驅動，是世界上最快的攔截艇之一，可在水下與大氣中飛行，是即將到來戰役的關鍵載具。"
  STR_HAMMERHEAD_UFOPEDIA: "兼具運輸與攔截功能的潛艇。將磁陣列系統複製到 X-Com 自製艇上的成果。雖然體型不大，其設計卻是一項驚人的技術成就。"
  STR_TRITON_UFOPEDIA: "海神號為突擊小隊運輸艇，配備完整的大氣與水中飛行引擎。其大載運量與堅固結構使其成為 X-Com 艦隊的主力。"
  STR_MANTA_UFOPEDIA: "曼塔號高速潛艇，單人駕駛的攔截飛行潛艇，外觀近似離子驅動的外星載具。在不斷升級的衝突中是一款極為有效的攻擊艇。"

  # 潛艇武器 / 艇載
  STR_AJAX_UFOPEDIA: "阿賈克斯魚雷是全球海底戰鬥的標準武器，作為精準而強力的嚇阻手段被廣泛使用。"
  STR_DUP_HEAD_UFOPEDIA: "貧鈾彈頭武器科技仍屬新興技術，這是第一款完整採用此技術的商業水中武器系統。"
  STR_CRAFT_GAS_CANNON_UFOPEDIA: "壓縮氣體驅動的加農系統，發射具有高穿甲能力的實心彈頭。"
  STR_PWT_CANNON_UFOPEDIA: "脈波魚雷採用超熱燃料系統與極密緻的彈頭，可貫穿大多數合金。"
  STR_GAUSS_CANNON_UFOPEDIA: "高斯武器是新開發的 X-Com 科技。其粒子加速器以小型液氮冷卻聚變反應爐驅動。"
  STR_SONIC_OSCILLATOR_UFOPEDIA: "強力的聽覺震盪器產生聲波，藉由震動目標分子鍵將其摧毀。"

  # 設施
  STR_AIR_LOCK_UFOPEDIA: "氣密艙允許裝備與人員進出海底基地。它永遠是新基地最先建造的設施。氣密艙區域易受敵對勢力入侵。"
  STR_LIVING_QUARTERS_UFOPEDIA: "每個居住區可容納最多 50 名人員。設施基本而實用。"
  STR_LABORATORY_UFOPEDIA: "一個實驗室可容納 50 名科學家。配備最新材料、生化與武器研究設備。X-Com 可使用全球最頂尖的民用與軍用實驗室。"
  STR_WORKSHOP_UFOPEDIA: "工坊配備依據實驗室最新設計製造裝備所需的所有設備。可容納 50 名技師，在製品也會佔用空間。"
  STR_STANDARD_SONAR_UFOPEDIA: "標準聲納在大多數深度有效範圍超過 450 公里，並連結地球同步衛星網路進行海面分析。每 30 分鐘掃描週期有 10% 機率偵測到水下或空中載具。"
  STR_WIDE_ARRAY_SONAR_UFOPEDIA: "廣域聲納在所有深度有效範圍超過 700 公里，並連結地球同步衛星網路進行海面分析。每 30 分鐘掃描週期有 20% 機率偵測到水下或空中載具。"
  STR_TORPEDO_DEFENSES_UFOPEDIA: "魚雷防禦系統可抵禦試圖停靠基地的敵對水下載具。"
  STR_GENERAL_STORES_UFOPEDIA: "所有裝備、武器系統、彈藥、回收物資與潛行武器系統皆存放於倉庫，包括分派給潛艇塢內潛艇的裝備。"
  STR_ALIEN_CONTAINMENT_UFOPEDIA: "活外星人需要特殊拘留設施。這些單位維持其生命系統並使其戰鬥力歸零。拘留設施可容納 10 個外星生命體。"
  STR_GAUSS_DEFENSES_UFOPEDIA: "高斯防禦是抵禦敵對潛艇攻擊的最新、最有效的防護。"
  STR_SONIC_DEFENSES_UFOPEDIA: "聲波震盪器防禦提供強大而高效的反擊力。"
  STR_PWT_DEFENSES_UFOPEDIA: "脈波魚雷是抵禦外星攻擊最有效的防禦。彈頭極密緻，可貫穿所有已知裝甲，其產生的磁波可癱瘓電子防禦。"
  STR_BOMBARDMENT_SHIELD_UFOPEDIA: "壓力轟擊護盾可阻止外星潛艇停靠基地，並建立共振場以持續排斥來犯潛艇，讓防禦系統有時間重複射擊。實際上可使既有防禦的效果加倍。"
  STR_MC_GENERATOR_UFOPEDIA: "由於外星潛艇利用分子控制科技偵測生命存在，使用負向 M.C. 發射器可在基地周圍建立難以穿透的屏蔽，混淆外星人並隱藏我方蹤跡。"
  STR_MC_LAB_UFOPEDIA: "分子控制實驗室可同時為最多十名水兵植入並進行訓練。植入體以手術方式植入水兵頭部，需大量訓練才能運用。植入技能可搭配分子裝置在戰鬥中發動攻擊。"
  STR_TRANSMISSION_RESOLVER_UFOPEDIA: "外星通訊利用其建立的分子控制植入體網路。傳輸解析器攔截外星潛艇通訊並解碼資訊，可顯示外星潛艇類型、外星種族與所進行的活動。"
  STR_SUB_PEN_UFOPEDIA: "每座潛艇塢可停放一艘潛艇，提供 X-Com 潛艇隊的維護、補充燃料與修復設施。每艘駐紮基地的飛行潛艇必須有專屬潛艇塢，他艇不可佔用，即便該艇出任務也一樣。"

  # 武器 / 物品
  STR_DART_PISTOL_UFOPEDIA: "X-Com 飛鏢槍是一款小巧、精準、強力的單位，配備可裝填 12 發空心鏢的彈匣。飛鏢以彈匣內的氣體推進。"
  STR_JET_HARPOON_UFOPEDIA: "這款水中步槍精準而強力，從 10 發密封彈匣中發射空心鋼魚叉。每支魚叉自帶氣體儲存槽。"
  STR_GAS_CANNON_UFOPEDIA: "氣體科技家族中的重量級武器，發射實心彈頭，部分配備高爆或磷光尖端，是經驗豐富水兵的愛用武器。"
  STR_HYDRO_JET_CANNON_UFOPEDIA: "水噴流加農為重型步兵武器系統，發射鎂燃料的迷你魚雷。雖然強力，但水噴流加農體積笨重，僅適合水中使用。"
  STR_TORPEDO_LAUNCHER_UFOPEDIA: "真正的重量級武器，這款大型發射器可發射三種魚雷，每種皆有自己的推進單元。極具毀滅性，唯一缺點是須手動裝填。彈藥種類有大、小型高爆與磷光尖端魚雷，僅限水下使用。"
  STR_GAUSS_PISTOL_UFOPEDIA: "高斯手槍採用粒子加速科技，這是現代武器的最新發展。快速、精準，水上水下皆可使用。高斯科技是上一場戰爭中學到的電漿科技的延伸發展。"
  STR_GAUSS_PISTOL_CLIP_UFOPEDIA: "高斯手槍採用粒子加速科技，這是現代武器的最新發展。快速、精準，水上水下皆可使用。高斯科技是上一場戰爭中學到的電漿科技的延伸發展。"
  STR_GAUSS_RIFLE_UFOPEDIA: "比高斯手槍更上一層，配備雙粒子加速器，威力大幅提升。取代以 Elerium 驅動的電漿系統，改用微粒子加速器產生反質子流。"
  STR_GAUSS_RIFLE_CLIP_UFOPEDIA: "比高斯手槍更上一層，配備雙粒子加速器，威力大幅提升。取代以 Elerium 驅動的電漿系統，改用微粒子加速器產生反質子流。"
  STR_HEAVY_GAUSS_UFOPEDIA: "重型高斯雖笨重但極為有效，配備 3 個粒子加速器，幾乎無物可擋。反質子流被封裝於砷化物彈殼內，撞擊時瓦解並釋放反物質。"
  STR_HEAVY_GAUSS_CLIP_UFOPEDIA: "重型高斯雖笨重但極為有效，配備 3 個粒子加速器，幾乎無物可擋。反質子流被封裝於砷化物彈殼內，撞擊時瓦解並釋放反物質。"
  STR_MAGNA_BLAST_GRENADE_UFOPEDIA: "本款標準配發手榴彈配備精準而複雜的計時器，可精細控制引爆時機。"
  STR_DYE_GRENADE_UFOPEDIA: "染料煙幕彈具備雙重用途，可在暴露情境下提供掩護。在水中與陸地皆可使用，水中以粒子雲形式噴出，產生章魚般的墨噴效果，陸上則為密集煙霧。"
  STR_PARTICLE_DISTURBANCE_GRENADE_UFOPEDIA: "可像普通手榴彈一樣投擲的近接手榴彈，部署後由附近的移動觸發引爆。需有技巧與訓練才能妥善運用。"
  STR_MAGNA_PACK_EXPLOSIVE_UFOPEDIA: "本爆裂物僅供爆破之用。但過往經驗顯示，這種強力爆裂包是清剿外星人的理想武器。爆炸半徑大，務必確保水兵在最低安全距離之外。"
  STR_MEDI_KIT_UFOPEDIA: "使用時面對受傷的 X-Com 隊員，或站在昏迷水兵身體上方。{NEWLINE}治療> 紅色代表傷口。選擇身體部位後點選「治療」按鈕，一處致命傷將被治癒，健康也會恢復。{NEWLINE}興奮劑> 恢復能量並喚醒昏迷的水兵。要喚醒昏迷的水兵需直接站在其身體正上方。{NEWLINE}止痛劑> 恢復受傷水兵的士氣。"
  STR_THERMAL_TAZER_UFOPEDIA: "本裝置僅可近戰使用，但能在不殺死生物的前提下凍結並使其暈眩。"
  STR_VIBRO_BLADE_UFOPEDIA: "震動刃為長而銳利的高強度合金刀刃，以超過每分鐘 6000 轉旋轉，可破開最堅固的潛水裝甲。動力源為外星發明，我方早期仿製失敗，刀刃要不轉速太慢，要不在水壓下爆裂。"
  STR_THERMIC_LANCE_UFOPEDIA: "熱熔長矛是震動刃科技的延伸。刀刃高速旋轉，並由 Z 元素動力源加熱至超高溫，可如熱刀切奶油般切開裝甲。"
  STR_HEAVY_THERMIC_LANCE_UFOPEDIA: "重型熱熔長矛是熱熔長矛的強化版。雙熱源與更高轉速使其幾乎可貫穿所有材質。"
  STR_SONIC_CANNON_UFOPEDIA: "聲波加農是聲波武器家族中最強的型號，配備高頻聽覺震盪器與比爆裂步槍更大的共鳴腔，並具備脈衝引爆系統，可調變超聲波以產生更有效的聲波震懾。"
  STR_CANNON_POWER_CLIP_UFOPEDIA: "這款緊湊裝置作為聲波加農的彈藥使用，內含少量 Z 元素。"
  STR_SONIC_BLASTA_RIFLE_UFOPEDIA: "更強力的聲波裝置，連高碳鋼也無法對其免疫。高度緊湊的波形發射器配備超導放大器以增強威力。"
  STR_BLASTA_POWER_CLIP_UFOPEDIA: "這款小型物件作為聲波步槍的動力源，是一款強力的外星武器，內含少量 Z 元素。"
  STR_SONIC_PISTOL_UFOPEDIA: "聲波手槍是基於超聲波音波的外星武器，可在幾秒內將骨頭液化。其超聲波頻率超出人類聽力範圍。"
  STR_PISTOL_POWER_CLIP_UFOPEDIA: "緊湊型外星聲波手槍的動力源，內含 Z 元素 — 所有外星能量的來源。"
  STR_DISRUPTOR_PULSE_LAUNCHER_UFOPEDIA: "本款外星武器僅可水中使用，發射自走式「干擾脈衝彈」。點選射擊時可為彈頭設定路徑點，配置足夠路徑點後點選發射圖示即可。"
  STR_DISRUPTOR_AMMO_UFOPEDIA: "本裝置為配備機載電腦導引系統的干擾脈衝彈，由干擾脈衝發射器發射。"
  STR_THERMAL_SHOK_LAUNCHER_UFOPEDIA: "小型熱擊發射器，發射化學凍結彈，非常適合用於捕捉活外星人。"
  STR_THERMAL_SHOK_BOMB_UFOPEDIA: "熱擊彈用於捕捉活人，也可用於大多數外星種族，需以熱擊發射器發射。"
  STR_SONIC_PULSER_UFOPEDIA: "本裝置運作方式與標準手榴彈相同，但威力強大數倍。手榴彈使用單一脈衝聲波爆裂，向四面八方同時發出。"

